<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Mamá! ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            font-family: 'Arial', sans-serif;
        }
        
        #binary-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .message-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            animation: fadeIn 3s ease-in-out;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
            pointer-events: none;
        }
        
        .birthday-message {
            font-size: 4rem;
            color: #ff1493; /* Rosa más intenso */
            margin: 0;
            animation: pulse 2s infinite;
            letter-spacing: 4px;
            font-weight: bold;
            line-height: 1.4;
        }
        
        .sub-message {
            font-size: 2.5rem;
            color: #ff69b4; /* Rosa medio */
            margin-top: 20px;
            animation: pulse 2s infinite 0.5s;
        }
        
        .heart {
            color: #ff1493;
            font-size: 3rem;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; transform: translate(-50%, -30%); }
            100% { opacity: 1; transform: translate(-50%, -50%); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .birthday-message {
                font-size: 2.5rem;
            }
            .sub-message {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="binary-rain"></canvas>
    
    <div class="message-container">
        <div class="birthday-message">
            ¡Feliz Cumpleaños<br>Mami!
        </div>
        <div class="sub-message">
            Te amo <span class="heart">❤️</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('binary-rain');
        const ctx = canvas.getContext('2d');

        // Ajustar tamaño del canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Caracteres binarios
        const binaryChars = ['0', '1'];
        
        // Configuración de la lluvia
        const fontSize = 20;
        const columns = canvas.width / fontSize;
        
        // Array para almacenar la posición Y de cada columna
        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100; // Posición inicial aleatoria
        }

        // Colores rosados
        function getRandomPinkColor() {
            const pinkColors = [
                'rgba(255, 182, 193, 0.9)', // Rosa claro
                'rgba(255, 192, 203, 0.9)', // Rosa
                'rgba(255, 105, 180, 0.9)', // Hot pink
                'rgba(255, 20, 147, 0.9)',  // Deep pink
                'rgba(219, 112, 147, 0.9)', // Pale violet red
                'rgba(255, 174, 185, 0.9)', // Rosa pastel
                'rgba(255, 130, 171, 0.9)'  // Rosa medio
            ];
            return pinkColors[Math.floor(Math.random() * pinkColors.length)];
        }

        // Función para dibujar la lluvia binaria
        function drawBinaryRain() {
            // Fondo negro con efecto de desvanecimiento
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Configurar estilo del texto
            ctx.font = `bold ${fontSize}px 'Courier New', monospace`;

            // Dibujar cada columna
            for (let i = 0; i < drops.length; i++) {
                // Carácter aleatorio (0 o 1)
                const char = binaryChars[Math.floor(Math.random() * binaryChars.length)];
                
                // Color rosado aleatorio
                ctx.fillStyle = getRandomPinkColor();
                
                // Dibujar el carácter
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                // Mover la gota hacia abajo
                drops[i]++;

                // Reiniciar cuando llega al fondo (con variación aleatoria)
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
            }
        }

        // Animar la lluvia
        setInterval(drawBinaryRain, 50);

        // Efecto adicional: estrellas brillantes ocasionales
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.style.position = 'fixed';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.color = '#ff69b4';
            sparkle.style.fontSize = '10px';
            sparkle.style.opacity = Math.random() * 0.5 + 0.3;
            sparkle.style.zIndex = '3';
            sparkle.style.pointerEvents = 'none';
            sparkle.style.animation = 'fadeOut 2s forwards';
            sparkle.innerHTML = '✨';
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 2000);
        }

        // Crear estrellas cada 500ms
        setInterval(createSparkle, 500);

        // Añadir estilo para la animación de las estrellas
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; transform: scale(1); }
                100% { opacity: 0; transform: scale(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
